name: Backend Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        # Make sure we install all the new packages, including google-genai
        pip install fastapi uvicorn pytest httpx networkx google-genai python-dotenv

    - name: Run Pytest
      env:
        # We inject a fake API key here so the GitHub server doesn't crash 
        # when gemini_agent.py looks for a key in the .env file!
        GEMINI_API_KEY: "dummy_key_for_github_actions"
      run: |
        cd backend
        pytest